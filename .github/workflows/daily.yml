name: Daily 48 Laws Post

on:
  schedule:
    # 12:00 UTC = 17:30 IST (target 5:30 PM India time).
    # GitHub Actions cron typically lands 5-30 min late under load, so most
    # runs will go live between 5:30 and 6:00 PM IST — prime evening window.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build today's video
        env:
          START_DATE: ${{ vars.START_DATE }}
        run: python -c "from generate import build; from main import current_day; build(current_day())"

      - name: Commit output so it's reachable via raw URL
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/
          git commit -m "build: day video [skip ci]" || echo "no changes"
          git push

      - name: Post to Instagram + YouTube
        id: post
        env:
          START_DATE: ${{ vars.START_DATE }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          UPLOAD_BACKEND: github
          GITHUB_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/output
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python main.py

      - name: Email — success
        if: success() && env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: instaautomatic <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[OK] Day ${{ steps.post.outputs.day_num }} posted — ${{ steps.post.outputs.title }}: ${{ steps.post.outputs.headline }}"
          body: |
            Posted successfully to @nandetroll_

            Day ${{ steps.post.outputs.day_num }} of 92 (overall series)
            Book: ${{ steps.post.outputs.book }}
            Book Day: ${{ steps.post.outputs.book_day }} of ${{ steps.post.outputs.book_total }}
            Title: ${{ steps.post.outputs.title }}
            Headline: ${{ steps.post.outputs.headline }}

            IG Media ID: ${{ steps.post.outputs.media_id }}
            View on Instagram: https://www.instagram.com/nandetroll_/

            YouTube Short: ${{ steps.post.outputs.youtube_url }}

            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Email — failure
        if: failure() && env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: instaautomatic <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[FAIL] Daily post FAILED for Day ${{ steps.post.outputs.day_num }}"
          body: |
            The daily post workflow FAILED.

            Day attempted: ${{ steps.post.outputs.day_num }} (book day ${{ steps.post.outputs.book_day }} / ${{ steps.post.outputs.book_total }} — ${{ steps.post.outputs.book }})
            Title: ${{ steps.post.outputs.title }}
            Headline: ${{ steps.post.outputs.headline }}

            Check the run logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Common causes:
            - IG_ACCESS_TOKEN expired (re-run "Refresh IG Access Token" workflow)
            - GitHub raw URL not yet propagated for the just-built video (re-run this workflow)
            - Meta API rate-limited (wait, retry)
