name: Daily 48 Laws Post

on:
  schedule:
    # 2 posts/day. GH Actions cron drifts 15-90 min late under load.
    - cron: "30 3 * * *"     # AM slot  (~09:00 IST, lands ~09:30-11:00)
    - cron: "30 12 * * *"    # PM slot  (~18:00 IST, lands ~18:30-20:00)
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot for a manual run"
        type: choice
        options: ["AM", "PM"]
        default: "AM"

permissions:
  contents: write

# Per-slot concurrency: AM and PM never block each other, but a delayed run of
# the same slot queues (slot-aware idempotency in main.py then exits it cleanly).
concurrency:
  group: daily-post-${{ github.event.schedule || inputs.slot }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Resolve posting slot
        run: |
          if [ "${{ github.event.schedule }}" = "30 12 * * *" ]; then
            echo "POST_SLOT=PM" >> "$GITHUB_ENV"
          else
            echo "POST_SLOT=${{ inputs.slot || 'AM' }}" >> "$GITHUB_ENV"
          fi
          echo "Resolved POST_SLOT=$(grep POST_SLOT "$GITHUB_ENV" | tail -1)"

      - name: Build this slot's video
        env:
          START_DATE: ${{ vars.START_DATE }}
        run: python -c "from generate import build, ordered_item; from main import current_position; build(ordered_item(current_position()))"

      - name: Commit output so it's reachable via raw URL
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/
          git commit -m "build: day video [skip ci]" || { echo "no changes"; exit 0; }
          # Bounded rebase-retry: a concurrent manual/cron push moving the
          # branch must NOT non-fast-forward-fail the day. [skip ci] keeps the
          # rebased auto-commit from re-triggering the workflow.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected (attempt $attempt) — rebasing onto origin/${GITHUB_REF_NAME}"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep 3
          done
          echo "ERROR: could not push output after 5 rebase-retries" >&2
          exit 1

      - name: Post to Instagram + YouTube
        id: post
        env:
          START_DATE: ${{ vars.START_DATE }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          UPLOAD_BACKEND: github
          GITHUB_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/output
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python main.py

      - name: Email — success
        if: success() && env.MAIL_USERNAME != '' && steps.post.outputs.skipped != 'true'
        uses: dawidd6/action-send-mail@v3
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: instaautomatic <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[OK] Day ${{ steps.post.outputs.day_num }} posted — ${{ steps.post.outputs.title }}: ${{ steps.post.outputs.headline }}"
          body: |
            Posted successfully to @nandetroll_

            Day ${{ steps.post.outputs.day_num }} of 92 (overall series)
            Book: ${{ steps.post.outputs.book }}
            Book Day: ${{ steps.post.outputs.book_day }} of ${{ steps.post.outputs.book_total }}
            Title: ${{ steps.post.outputs.title }}
            Headline: ${{ steps.post.outputs.headline }}

            IG Media ID: ${{ steps.post.outputs.media_id }}
            View on Instagram: https://www.instagram.com/nandetroll_/

            YouTube Short: ${{ steps.post.outputs.youtube_url }}

            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Email — failure
        if: failure() && env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: instaautomatic <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[FAIL] Daily post FAILED for Day ${{ steps.post.outputs.day_num }}"
          body: |
            The daily post workflow FAILED.

            Day attempted: ${{ steps.post.outputs.day_num }} (book day ${{ steps.post.outputs.book_day }} / ${{ steps.post.outputs.book_total }} — ${{ steps.post.outputs.book }})
            Title: ${{ steps.post.outputs.title }}
            Headline: ${{ steps.post.outputs.headline }}

            Check the run logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Common causes:
            - IG_ACCESS_TOKEN expired (re-run "Refresh IG Access Token" workflow)
            - GitHub raw URL not yet propagated for the just-built video (re-run this workflow)
            - Meta API rate-limited (wait, retry)
