name: Refresh IG Access Token

on:
  schedule:
    # Mondays at 06:00 UTC (~11:30 AM IST). Refreshes ~weekly so the token
    # never gets close to its 60-day expiry.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Refresh long-lived token + update GitHub Secret
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          CURRENT_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/refresh_token.py

      - name: Email — token refresh FAILED
        if: failure() && env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: instaautomatic <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[URGENT] IG token refresh failed — daily posts will stop in <60 days"
          body: |
            The weekly Meta token refresh FAILED.

            If this is not fixed, IG_ACCESS_TOKEN will expire and daily posts
            will stop. The current token expires within 60 days of its last
            successful refresh.

            Run logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Common causes + fixes:
            - APP_SECRET wrong → regenerate at developers.facebook.com
            - GH_TOKEN expired → regenerate the GitHub PAT and update the secret
            - IG_ACCESS_TOKEN already expired → manually re-run the bootstrap
              flow (see README) and update IG_ACCESS_TOKEN secret
